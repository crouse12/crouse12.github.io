<!DOCTYPE html>
<html>
<head>
  <script src="https://crouse12.github.io/face-api.js"></script>
  <script src="https://crouse12.github.io/js/commons.js"></script>
  <script src="https://crouse12.github.io/js/faceDetectionControls.js"></script>
  <script src="https://crouse12.github.io/js/imageSelectionControls.js"></script>
  <link rel="stylesheet" href="https://crouse12.github.io/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/0.100.2/css/materialize.css">
  <script type="text/javascript" src="https://code.jquery.com/jquery-2.1.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/0.100.2/js/materialize.min.js"></script>
</head>
<body>

    <img id="myImg" src="bbt1.jpg" />
    <canvas id="myCanvas">

  </body>

  <script>
    function initImageSelectionControls(initialValue = 'http://192.168.0.100:81/stream', withFaceExpressionImages = false) {
  renderImageSelectList(
    '#selectList',
    async (uri) => {
      await onSelectedImageChanged(uri)
    },
    initialValue,
    withFaceExpressionImages
  )
  onSelectedImageChanged($('#selectList select').val())
}
    async function updateResults() {
      if (!isFaceDetectionModelLoaded()) {
        return
      }

  const input = document.getElementById("myImg");
  const result = await faceapi
    .detectSingleFace(input, new faceapi.SsdMobilenetv1Options())
    .withFaceLandmarks()
    .withFaceDescriptor();
  const displaySize = { width: input.width, height: input.height };
  // resize the overlay canvas to the input dimensions
  const canvas = document.getElementById("myCanvas");
  faceapi.matchDimensions(canvas, displaySize);
  const resizedDetections = faceapi.resizeResults(result, displaySize);
  console.log(resizedDetections);
})();
    }

    async function run() {
      // load face detection
      await changeFaceDetector(SSD_MOBILENETV1)

      // start processing image
      updateResults()
    }

    $(document).ready(function() {
      renderNavBar('#navbar', 'face_detection')
      initImageSelectionControls()
      initFaceDetectionControls()
      run()
    })
  </script>
</body>
</html>
